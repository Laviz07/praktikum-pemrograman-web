<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Halaman Pendaftaran</title>
		<link rel="stylesheet" href="style.css" />
		<script src="script.js"></script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<!-- ------------------------------- HEADER -------------------------------- -->
		<header>
			<h1>Selamat Datang di Website Sederhana</h1>
		</header>

		<!-- ------------------------------- NAVBAR -------------------------------- -->
		<nav>
			<ul>
				<li><a href="#">Beranda</a></li>
				<li><a href="#">Tentang</a></li>
				<li><a href="#">Layanan</a></li>
				<li><a href="#">Kontak</a></li>
			</ul>
		</nav>

		<div class="container">
			<section class="content">
				<!-- ----------------------------- JUDUL FORM ------------------------------ -->
				<h2>Formulir Pendaftaran</h2>
				<p style="margin-top: 8px">
					Silahkan isi formulir di bawah ini untuk mendaftar:
				</p>

				<form
					class="form-group"
					method="GET"
					enctype="multipart/form-data"
					onsubmit="alert('Pendaftaran Berhasil')"
				>
					<span class="input-group">
						<label for="fullName">Nama Lengkap:</label>
						<input
							type="text"
							name="fullName"
							placeholder="Masukkan Nama Anda"
							required
							class="input-form"
						/>
					</span>

					<span class="input-group">
						<label for="email">Email:</label>
						<input
							type="email"
							name="email"
							placeholder="Masukkan Email Anda"
							required
							class="input-form"
						/>
					</span>

					<span class="input-group">
						<label for="Password">Password:</label>
						<input
							type="password"
							name="Password"
							placeholder="Masukkan Password Anda"
							required
							class="input-form"
						/>
					</span>

					<span class="input-group underline">
						<label for="kelamin">Jenis Kelamin:</label>
						<span class="radio-group">
							<input
								type="radio"
								name="kelamin"
								value="Laki-laki"
								class="radio-form"
								id="laki"
								required
							/>
							<label for="laki">Laki-laki</label>
						</span>

						<span class="radio-group">
							<input
								type="radio"
								name="kelamin"
								value="Perempuan"
								class="radio-form"
								id="Perempuan"
								required
							/>
							<label for="Perempuan">Perempuan</label>
						</span>
					</span>

					<span class="input-group underline">
						<label for="kelamin">Hobi:</label>
						<span class="radio-group">
							<input
								type="checkbox"
								name="hobi"
								value="Musik"
								class="radio-form"
								id="Musik"
							/>
							<label for="Musik">Musik</label>
						</span>

						<span class="radio-group">
							<input
								type="checkbox"
								name="hobi"
								value="Olahraga"
								class="radio-form"
								id="Olahraga"
							/>
							<label for="Olahraga">Olahraga</label>
						</span>

						<span class="radio-group">
							<input
								type="checkbox"
								name="hobi"
								value="Membaca"
								class="radio-form"
								id="Membaca"
							/>
							<label for="Membaca">Membaca</label>
						</span>

						<span class="radio-group">
							<input
								type="checkbox"
								name="hobi"
								value="Nonton"
								class="radio-form"
								id="Nonton"
							/>
							<label for="Nonton">Nonton</label>
						</span>
					</span>

					<span class="input-group">
						<label for="kota">Pilih Kota:</label>
						<select name="kota" id="kota" class="input-form">
							<option value="Bekasi">Bekasi</option>
							<option value="Jakarta">Jakarta</option>
							<option value="Bandung">Bandung</option>
						</select>
					</span>

					<span class="input-group">
						<label for="pesan">Pesan Tambahan:</label>
						<textarea
							type="text"
							name="pesan"
							placeholder="Masukkan Pesan Anda"
							required
							class="input-form"
							id="pesan"
							rows="5"
						></textarea>
					</span>

					<button class="btn-submit">Kirim</button>
				</form>
			</section>

			<aside class="sidebar">
				<h2>Sidebar</h2>
				<p style="margin-top: 8px">
					Bagian Sidebar dapat berisi tautan, iklan, atau informasi tambahan
				</p>
			</aside>
		</div>

		<footer>
			<p>&copy; 2024 Halaman Web Singaperbangsa. Dibuat dengan CSS.</p>
		</footer>
	</body>
</html>
