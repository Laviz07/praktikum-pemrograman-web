<!doctype html>
<html lang="id">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cek Nilai Mahasiswa</title>

		<!-- CSS -->
		<link rel="stylesheet" href="style.css" />

		<!-- JS -->
		<script src="script.js" defer></script>

		<!-- Font & Icons -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
		/>
	</head>
	<body>
		<div class="container">
			<div class="glass-card">
				<!-- KIRI: gambar & form input -->
				<div class="panel-left">
					<div class="image-wrapper">
						<img src="gedung-unsika.jpg" alt="gedung unsika" />
						<div class="image-title">Cek Nilai Mahasiswa</div>
					</div>

					<div class="form-group">
						<label><i class="fas fa-id-card"></i> NIM</label>
						<input
							type="number"
							id="nimInput"
							placeholder="contoh: 2410631170091"
							autocomplete="off"
							required
						/>
					</div>

					<div class="form-group">
						<label><i class="fas fa-star"></i> Nilai Mata Kuliah</label>
						<input
							type="number"
							id="nilaiInput"
							placeholder="0 - 100"
							required
						/>
					</div>

					<button class="cek-btn" id="cekBtn" onclick="cekNilai()" disabled>
						<i class="fas fa-check-circle"></i> Cek Nilai
					</button>

					<!-- keterangan kecil -->
					<div
						style="
							font-size: 0.85rem;
							color: #64748b;
							margin-top: 0.5rem;
							display: flex;
							gap: 1rem;
							justify-content: center;
							border-top: 1px dashed #cbd5e1;
							padding-top: 1rem;
						"
					>
						<span
							><i class="fas fa-table" style="margin-right: 5px"></i>80-100 A |
							70-79 B | 60-69 C | 50-59 D | 0-49 E</span
						>
					</div>
				</div>

				<!-- KANAN: kotak hasil dengan blank state awal -->
				<div class="panel-right">
					<div class="result-header">
						<i class="fas fa-clipboard-check"></i>
						<h3>Hasil Konversi</h3>
					</div>

					<div id="resultBox">
						<!-- BLANK STATE (default) -->
						<div class="blank-state">
							<p>Belum ada hasil</p>
						</div>
					</div>

					<!-- pesan ringan di bawah hasil -->
					<p
						style="
							color: #64748b;
							font-size: 0.85rem;
							margin-top: 1rem;
							text-align: center;
						"
					>
						<i class="fas fa-info-circle"></i> masukkan NIM dan nilai, lalu
						tekan Cek Nilai
					</p>
				</div>
			</div>
		</div>
	</body>
</html>
